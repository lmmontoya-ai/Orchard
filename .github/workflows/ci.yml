name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-baseline:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        shell: pwsh
        run: cmake --preset default

      - name: Build
        shell: pwsh
        run: cmake --build --preset default --parallel

      - name: Test
        shell: pwsh
        run: ctest --preset default

